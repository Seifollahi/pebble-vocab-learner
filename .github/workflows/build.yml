name: Pebble Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to publish releases on tag pushes
    container:
      image: rebble/pebble-sdk:latest

    steps:
    - uses: actions/checkout@v4

    - name: Generate vocab.h from vocab_db.json
      run: python3 tools/generate_vocab.py || python tools/generate_vocab.py

    - name: Set up Pebble SDK core
      run: |
        mkdir -p "$HOME/.pebble-sdk"
        touch "$HOME/.pebble-sdk/NO_TRACKING"
        # Actions overrides $HOME, so any SDK baked into the image is invisible;
        # reuse it if present, otherwise install the archived 4.3 core
        # (the original download server is long dead).
        if [ -d /root/.pebble-sdk/SDKs ]; then
          cp -r /root/.pebble-sdk/. "$HOME/.pebble-sdk/"
        fi
        if ! pebble sdk list 2>/dev/null | grep -q "4\."; then
          yes | pebble sdk install https://github.com/aveao/PebbleArchive/raw/master/SDKCores/sdk-core-4.3.tar.bz2
        fi

    - name: Build Pebble App
      run: pebble build

    - name: Rename artifact
      run: |
        for f in build/*.pbw; do
          mv "$f" build/vocab_learner.pbw
          break
        done

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pebble-vocab-learner-pbw
        path: build/*.pbw

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/vocab_learner.pbw
        body_path: RELEASE_NOTES.md
