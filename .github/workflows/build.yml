name: Pebble Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rebble/pebble-sdk:latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Build Pebble App
      run: pebble build
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: pebble-vocab-learner-pbw
        path: build/*.pbw
